<header>
  <div class="site-branding">
    <div class="site-role">{{ .Site.Params.role }}</div>
    <div class="site-name"><a href="/">{{ .Site.Title }}</a></div>
  </div>
  <nav>
    <input type="checkbox" id="menu-toggle" class="menu-toggle-checkbox">
    <label for="menu-toggle" class="menu-toggle-label">menu</label>
    <ul class="nav-menu">
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
      <li class="theme-toggle-item">
        <span class="theme-choice" id="theme-day" role="button" tabindex="0" aria-label="Day mode">DAY</span>
        <span class="theme-choice" id="theme-night" role="button" tabindex="0" aria-label="Night mode">NIGHT</span>
      </li>
    </ul>
  </nav>
</header>
