<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} – {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} – {{ end }}{{ .Site.Title }}">
  <meta property="og:description" content="{{ .Site.Params.description }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}images/og-007.jpg">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    <article>
      {{ block "main" . }}{{ end }}
    </article>
  </main>
  {{ partial "footer.html" . }}
  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      var root = document.documentElement;

      function getSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'night' : 'day';
      }

      function applyTheme(theme) {
        root.setAttribute('data-theme', theme);
        if (theme === 'night') {
          btn.innerHTML = '<span class="theme-inactive">DAY</span>  <span class="theme-active-night">[NIGHT]</span>';
        } else {
          btn.innerHTML = '<span class="theme-active-day">[DAY]</span>  <span class="theme-inactive">NIGHT</span>';
        }
      }

      var saved = localStorage.getItem('theme');
      var active = saved || getSystemTheme();
      applyTheme(active);

      btn.addEventListener('click', function() {
        var current = root.getAttribute('data-theme');
        var next = current === 'night' ? 'day' : 'night';
        localStorage.setItem('theme', next);
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
