<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if not .IsHome }}{{ .Title }} – {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <meta property="og:title" content="{{ if not .IsHome }}{{ .Title }} – {{ end }}{{ .Site.Title }}">
  <meta property="og:description" content="{{ .Site.Params.description }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}images/og-007.jpg">
  <meta property="og:image:alt" content="View from high on the Robert C. Byrd Green Bank Telescope, looking out through the white steel framework of the dish structure. A smaller radio telescope is visible far below in a clearing surrounded by dense forest, partially obscured by fog. Disposable camera photograph taken on an overcast day with bright diffuse light.">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('theme');
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'night' : 'day');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'day');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    <article>
      {{ block "main" . }}{{ end }}
    </article>
  </main>
  {{ partial "footer.html" . }}
  <script>
    (function() {
      var root = document.documentElement;
      var dayBtn = document.getElementById('theme-day');
      var nightBtn = document.getElementById('theme-night');

      function renderLabels() {
        var theme = root.getAttribute('data-theme') || 'day';
        if (theme === 'night') {
          dayBtn.textContent = 'DAY';
          nightBtn.textContent = '[NIGHT]';
          dayBtn.className = 'theme-choice theme-inactive';
          nightBtn.className = 'theme-choice theme-active-night';
        } else {
          dayBtn.textContent = '[DAY]';
          nightBtn.textContent = 'NIGHT';
          dayBtn.className = 'theme-choice theme-active-day';
          nightBtn.className = 'theme-choice theme-inactive';
        }
      }

      function setTheme(theme) {
        try { localStorage.setItem('theme', theme); } catch (e) {}
        root.setAttribute('data-theme', theme);
        renderLabels();
      }

      renderLabels();

      dayBtn.addEventListener('click', function() { setTheme('day'); });
      nightBtn.addEventListener('click', function() { setTheme('night'); });

      dayBtn.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setTheme('day'); }
      });
      nightBtn.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setTheme('night'); }
      });
    })();
  </script>
</body>
</html>
